<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>stratoclave-atelier</title>
    <link rel="stylesheet" href="/static/css/chat.css" />
</head>
<body>
    <header class="chat-header">
        <h1>stratoclave-atelier</h1>
        <nav class="chat-nav">
            <button
                type="button"
                id="button-new-session"
                data-testid="chat-new-session"
            >
                New session
            </button>
            <button
                type="button"
                id="button-freeze"
                data-testid="chat-freeze"
                disabled
            >
                Freeze
            </button>
            <a href="/panels" data-testid="chat-open-panels">Open panels</a>
        </nav>
    </header>
    <main class="chat-main">
        <ol id="chat-log" class="chat-log" data-testid="chat-log"></ol>
        <div
            id="chat-empty"
            class="chat-empty"
            data-testid="chat-empty"
        >
            Start by sending a prompt below. Each session keeps its own
            memory and can be frozen / forked from
            <a href="/panels">panels</a>.
        </div>
    </main>
    <form id="chat-form" class="chat-form" data-testid="chat-form">
        <textarea
            id="chat-input"
            name="prompt"
            placeholder="Send a prompt"
            required
            minlength="1"
            rows="3"
            data-testid="chat-input"
        ></textarea>
        <div class="chat-actions">
            <span id="chat-session-label" class="chat-session-label" data-testid="chat-session-label"></span>
            <button type="submit" id="chat-send" data-testid="chat-send">
                Send
            </button>
        </div>
    </form>
    <div id="status-bar" class="status" data-testid="status-bar" aria-live="polite"></div>

    <script type="module" src="/static/js/chat.js"></script>
</body>
</html>
